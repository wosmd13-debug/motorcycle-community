<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네이버 지도 SDK 진단</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 20px;
        line-height: 1.6;
        color: #1e293b;
      }
      .box {
        margin: 12px 0;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid #fed7aa;
        background: #fff7ed;
      }
      .ok {
        border-color: #86efac;
        background: #f0fdf4;
        color: #166534;
      }
      .fail {
        border-color: #fca5a5;
        background: #fef2f2;
        color: #991b1b;
      }
      #map {
        width: 100%;
        height: 420px;
        margin-top: 16px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
      }
      code {
        background: #f1f5f9;
        padding: 2px 6px;
        border-radius: 6px;
      }
      button {
        margin-right: 8px;
        margin-top: 8px;
        padding: 8px 14px;
        border: none;
        border-radius: 999px;
        background: #f97316;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      pre {
        background: #0f172a;
        color: #e2e8f0;
        padding: 12px;
        border-radius: 8px;
        overflow: auto;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>네이버 지도 SDK 진단 페이지</h1>
    <p>React 없이 SDK만 테스트합니다.</p>

    <div id="info" class="box"></div>
    <div id="status" class="box">테스트 준비 중…</div>
    <pre id="log"></pre>

    <p><strong>콘솔 Web 서비스 URL (포트 포함):</strong></p>
    <ul>
      <li><code>http://localhost:3000</code></li>
      <li><code>http://127.0.0.1:3000</code></li>
    </ul>

    <button type="button" id="btn-keyid">ncpKeyId 로 테스트</button>
    <button type="button" id="btn-clientid">ncpClientId 로 테스트</button>

    <div id="map"></div>

    <script>
      var CLIENT_ID = "rdlbuvf63f";
      var SCRIPT_ID = "naver-diag-sdk";
      var logs = [];

      function log(message) {
        logs.push(new Date().toLocaleTimeString() + " " + message);
        document.getElementById("log").textContent = logs.join("\n");
      }

      function setStatus(text, type) {
        var el = document.getElementById("status");
        el.textContent = text;
        el.className = "box " + (type || "");
      }

      function setInfo() {
        document.getElementById("info").innerHTML =
          "현재 Origin: <code>" +
          window.location.origin +
          "</code><br/>naver 객체: <code id=\"naverState\">확인 전</code>";
      }

      window.navermap_authFailure = function () {
        log("navermap_authFailure 호출됨 → Web URL 또는 Dynamic Map 설정 문제");
        setStatus(
          "인증 실패. 콘솔 Web URL에 " +
            window.location.origin +
            " (포트 포함) 등록 + Dynamic Map(Web) 체크 후 저장하세요.",
          "fail"
        );
        document.getElementById("naverState").textContent = "인증 실패";
      };

      function waitForNaver(timeoutMs) {
        return new Promise(function (resolve) {
          var start = Date.now();
          var timer = setInterval(function () {
            var ready =
              typeof window.naver !== "undefined" &&
              window.naver.maps &&
              typeof window.naver.maps.Map === "function";

            document.getElementById("naverState").textContent = ready
              ? "준비됨"
              : typeof window.naver === "undefined"
                ? "없음"
                : "maps 대기 중";

            if (ready) {
              clearInterval(timer);
              resolve(true);
              return;
            }
            if (Date.now() - start >= timeoutMs) {
              clearInterval(timer);
              resolve(false);
            }
          }, 100);
        });
      }

      function cleanupScript() {
        var old = document.getElementById(SCRIPT_ID);
        if (old) old.remove();
      }

      function runTest(paramName) {
        cleanupScript();
        logs = [];
        document.getElementById("map").innerHTML = "";
        setStatus(paramName + " 로 SDK 로딩 중… (callback 없이 동기 대기)", "");
        log("시작: " + paramName + "=" + CLIENT_ID);

        var script = document.createElement("script");
        script.id = SCRIPT_ID;
        script.type = "text/javascript";
        script.async = false;
        script.defer = false;
        script.src =
          "https://oapi.map.naver.com/openapi/v3/maps.js?" +
          paramName +
          "=" +
          encodeURIComponent(CLIENT_ID);

        script.onerror = function () {
          log("script.onerror → 네트워크 차단 또는 URL 오류");
          setStatus("스크립트 다운로드 실패 (네트워크/방화벽 확인)", "fail");
        };

        script.onload = function () {
          log("script.onload 발생");
        };

        document.head.appendChild(script);

        waitForNaver(15000).then(function (ready) {
          if (!ready) {
            log("15초 대기 후에도 naver.maps.Map 없음");
            setStatus(
              "SDK 객체가 생성되지 않았습니다. Web URL(" +
                window.location.origin +
                ") 등록과 Dynamic Map(Web)을 확인하세요.",
              "fail"
            );
            return;
          }

          log("naver.maps 준비 완료, 지도 생성 시도");
          try {
            new window.naver.maps.Map("map", {
              center: new window.naver.maps.LatLng(36.3, 127.8),
              zoom: 7,
            });
            setStatus("성공! " + paramName + " + Web URL 설정이 맞습니다.", "ok");
            log("지도 생성 성공");
          } catch (error) {
            log("지도 생성 예외: " + error.message);
            setStatus("SDK는 있지만 지도 생성 실패: " + error.message, "fail");
          }
        });
      }

      document.getElementById("btn-keyid").addEventListener("click", function () {
        runTest("ncpKeyId");
      });
      document.getElementById("btn-clientid").addEventListener("click", function () {
        runTest("ncpClientId");
      });

      setInfo();
      runTest("ncpClientId");
    </script>
  </body>
</html>
